<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Liga-Kampus</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
    <div class="container topbar-inner">
        <a class="brand" href="index.html">
            <div class="logo">⚽</div>
            <div>
                LIGA-KAMPUS
                <small>INTER-FACULTY TOURNAMENT MANAGER</small>
            </div>
        </a>

        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="register.html" class="active">Register</a>
        </nav>
    </div>
</header>

<section class="auth-page">
    <form class="auth-card" action="login.html" method="get">
        <h1>User Registration</h1>
        <p>Create an account. Required fields are marked with *</p>

        <div class="form-group">
            <label>Full Name <span class="required">*</span></label>
            <input type="text" required placeholder="Enter full name">
        </div>

        <div class="form-group">
            <label>Email <span class="required">*</span></label>
            <input type="email" required placeholder="example@student.edu">
        </div>

        <div class="form-group">
            <label>Password <span class="required">*</span></label>
            <input type="password" required minlength="6" placeholder="Minimum 6 characters">
        </div>

        <div class="form-group">
            <label>Confirm Password <span class="required">*</span></label>
            <input type="password" required minlength="6" placeholder="Re-enter password">
        </div>

        <div class="form-group">
            <label>Faculty <span class="required">*</span></label>
            <select required>
                <option value="">-- Select Faculty --</option>
                <option>Engineering</option>
                <option>Business</option>
                <option>Information Technology</option>
                <option>Science</option>
                <option>Arts</option>
            </select>
        </div>

        <div class="form-group">
            <label>Role <span class="required">*</span></label>
            <select required>
                <option value="">-- Select Role --</option>
                <option>Admin</option>
                <option>Team Manager</option>
            </select>
        </div>

        <button type="submit" class="btn btn-green" style="width:100%;">
            Register
        </button>

        <br><br>

        <p>
            Already have an account?
            <a href="login.html" style="color:#0b3d91; font-weight:bold;">
                Login here
            </a>
        </p>
    </form>
</section>

<script src="js/script.js"></script>
</body>
</html>
